name: Bug report
description: Report a reproducible defect in a solver, renderer, CLI, or example.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve OddlyAlive. Do not disclose security vulnerabilities here; follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: OddlyAlive version
      placeholder: 0.2.0-alpha.2 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Strand solver or renderer
        - Rigid-body solver or renderer
        - Surface-wave solver or renderer
        - CLI or project generator
        - Browser gallery
        - Demo-video pipeline
        - Documentation
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the smallest scene recipe and exact command that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: fingerprint
    attributes:
      label: Simulation fingerprint
      description: Include the diagnostic fingerprint when available.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node.js version, browser, and FFmpeg version if relevant
    validations:
      required: true
